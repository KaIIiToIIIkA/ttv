<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Партнери</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/KaIIiToIIIkA/ttv/refs/heads/main/favicon.png">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/KaIIiToIIIkA/ttv/refs/heads/main/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #9146FF; --bg: #07070f; --bg3: #121220; --bg4: #181830;
      --text: #eeeef8; --muted: #6e6e90; --border: rgba(145,70,255,.18);
    }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(145,70,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(145,70,255,.04) 1px, transparent 1px);
      background-size: 44px 44px; pointer-events: none; z-index: 0;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 56px;
      background: rgba(7,7,15,.96); border-bottom: 1px solid var(--border); backdrop-filter: blur(14px);
    }
    .nav-logo { font-family: 'Bebas Neue'; font-size: 21px; letter-spacing: 4px; color: var(--text); text-decoration: none; user-select: none; }
    .nav-logo em { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; padding-bottom: 2px; border-bottom: 2px solid transparent; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }
    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; background: none; border: none; z-index: 300; }
    .burger span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: all .3s; }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 0; z-index: 150;
      background: rgba(7,7,15,.98); backdrop-filter: blur(20px);
      flex-direction: column; align-items: center; justify-content: center; gap: 28px;
      border-top: 1px solid var(--border);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--muted); text-decoration: none; transition: color .2s; }
    .mobile-menu a:hover, .mobile-menu a.active { color: var(--accent); }
    @media(max-width: 768px) { nav { padding: 0 20px; } .nav-links { display: none; } .burger { display: flex; } }
    .nav-dropdown { position: relative; }
    .nav-dropdown > a { cursor: pointer; }
    .dropdown-menu { position: absolute; top: 100%; left: 50%; padding-top: 14px; transform: translateX(-50%); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 500; }
    .dropdown-menu-inner { background: rgba(7,7,15,.98); border: 1px solid var(--border); border-radius: 8px; padding: 8px 0; min-width: 170px; backdrop-filter: blur(14px); transform: translateY(-6px); transition: transform .2s; }
    .nav-dropdown:hover .dropdown-menu { opacity: 1; pointer-events: all; }
    .nav-dropdown:hover .dropdown-menu-inner { transform: translateY(0); }
    .dropdown-menu a { display: block; padding: 10px 18px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-decoration: none; border-bottom: none !important; transition: color .15s, background .15s; white-space: nowrap; }
    .dropdown-menu a:hover { color: var(--text); background: rgba(145,70,255,.08); }
    .dropdown-menu a.active { color: var(--accent); }
    .nav-dropdown > a.dropdown-active { color: var(--accent); border-bottom-color: var(--accent) !important; }

    .page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 100px 24px 80px; }
    .section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 4px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 5px; margin-bottom: 48px; }

    /* GRID */
    .partners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }

    /* CARD */
    .partner-card {
      position: relative; background: var(--bg4); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; text-decoration: none;
      display: flex; flex-direction: column;
      transition: transform .25s cubic-bezier(.22,1,.36,1), border-color .25s, box-shadow .25s;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .partner-card:hover { transform: translateY(-6px) scale(1.01); border-color: rgba(145,70,255,.5); box-shadow: 0 16px 48px rgba(145,70,255,.15), 0 0 0 1px rgba(145,70,255,.12); }

    /* banner */
    .partner-banner {
      width: 100%; aspect-ratio: 16/9; overflow: hidden;
      background: #0d0d1a; display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .partner-banner img { width: 100%; height: 100%; contain: cover; transition: transform .4s cubic-bezier(.22,1,.36,1), filter .4s; filter: brightness(.9) saturate(.85); }
    .partner-card:hover .partner-banner img { transform: scale(1.05); filter: brightness(1) saturate(1); }
    .partner-banner::after { content:''; position:absolute; inset:0; background: linear-gradient(to bottom, transparent 40%, rgba(7,7,15,.8) 100%); pointer-events:none; }

    /* tag */
    .partner-tag { position:absolute; top:12px; left:12px; z-index:2; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#fff; background:var(--accent); border-radius:4px; padding:3px 8px; }

    /* info row — без лого */
    .partner-info { padding: 16px 20px 18px; display:flex; align-items:center; gap:10px; }
    .partner-text { flex:1; min-width:0; }
    .partner-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .partner-handle { font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--muted); margin-top:3px; }
    .partner-arrow { font-size:20px; color:var(--accent); opacity:0; transition:opacity .2s, transform .2s; flex-shrink:0; }
    .partner-card:hover .partner-arrow { opacity:1; transform:translateX(4px); }
    .partner-card::before { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform .35s cubic-bezier(.22,1,.36,1); }
    .partner-card:hover::before { transform:scaleX(1); }

    footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:28px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-top:60px; }
    footer strong { color:var(--accent); }

    @media(max-width:480px) { .partners-grid { grid-template-columns:1fr; gap:16px; } .page { padding:76px 14px 40px; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Kai<em>III</em>To<em>III</em>kA</a>
  <div class="nav-links">
    <a href="index.html">Головна</a>
    <a href="about.html">Про мене</a>
    <a href="stream.html">Стрім</a>
    <a href="games.html">Ігри</a>
    <div class="nav-dropdown">
      <a class="dropdown-active">Інше ▾</a>
      <div class="dropdown-menu">
        <div class="dropdown-menu-inner">
          <a href="scripts.html">Мої скрипти</a>
          <a href="links.html">Посилання</a>
          <a href="schedule.html">Розклад</a>
          <a href="partnery.html" class="active">Партнери</a>
          <a href="clips.html">Кліпи</a>
        </div>
      </div>
    </div>
  </div>
  <button class="burger" id="burger" aria-label="Меню"><span></span><span></span><span></span></button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Головна</a>
  <a href="about.html">Про мене</a>
  <a href="stream.html">Стрім</a>
  <a href="games.html">Ігри</a>
  <a href="scripts.html">Мої скрипти</a>
  <a href="links.html">Посилання</a>
  <a href="schedule.html">Розклад</a>
  <a href="partnery.html" class="active">Партнери</a>
  <a href="clips.html">Кліпи</a>
</div>

<div class="page">
  <p class="section-label">// partners</p>
  <h1 class="section-title">Партнери</h1>
  <div class="partners-grid" id="partnersGrid"></div>
</div>

<footer><strong>KaIIiToIIIkA — рекомендовано анонімною асоціацією стримерів 🖤</strong></footer>

<script>
  // ════════════════════════════════════════
  // ПАРТНЕРИ
  // name:   назва партнера
  // handle: підпис / сайт
  // tag:    бейдж у кутку ('Community', 'Sponsor', ...)
  // url:    посилання при кліку
  // banner: пряме посилання на зображення 16:9
  // ════════════════════════════════════════
  const PARTNERS = [
    {
      name: 'UA Twitch Streamers',
      handle: 'uatwitch.online',
      tag: 'Community',
      url: 'https://uatwitch.online/',
      banner: 'https://media.discordapp.net/attachments/1245691638462812284/1509967814453362840/uas.png?ex=6a1b1a9c&is=6a19c91c&hm=bd4df97989969d4b2e02640ba5ea9062c328b88c4380805f7e4fee2dbede5331&=&format=webp&quality=lossless',
    },
    {
      name: 'Warframe UA Community',
      handle: 'discord.gg/2GZrucnpQB',
      tag: 'Discord',
      url: 'https://discord.com/invite/2GZrucnpQB',
      banner: 'https://media.discordapp.net/attachments/1245691638462812284/1509967972351873074/uas3.png?ex=6a1b1ac2&is=6a19c942&hm=b4a194ea6e1afcf7b0d2921c56ef1b49a57e159c9ad75765ae9baec10ed2f8b8&=&format=webp&quality=lossless', // ← вставте пряме посилання на банер
    },
    // Додай ще партнерів тут ↓
    // { name: '', handle: '', tag: '', url: '', banner: '' },
  ];

  const grid = document.getElementById('partnersGrid');

  PARTNERS.forEach((p, i) => {
    const card = document.createElement('a');
    card.href = p.url || '#';
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.className = 'partner-card';
    card.style.animationDelay = (i * 0.1) + 's';

    card.innerHTML = `
      <div class="partner-banner" style="position:relative">
        ${p.banner ? `<img src="${p.banner}" alt="${p.name}">` : ''}
        ${p.tag ? `<span class="partner-tag">${p.tag}</span>` : ''}
      </div>
      <div class="partner-info">
        <div class="partner-text">
          <div class="partner-name">${p.name}</div>
          ${p.handle ? `<div class="partner-handle">${p.handle}</div>` : ''}
        </div>
        <div class="partner-arrow">→</div>
      </div>
    `;
    grid.appendChild(card);
  });

  const burger = document.getElementById('burger');
  const mobileMenu = document.getElementById('mobileMenu');
  burger.addEventListener('click', () => { burger.classList.toggle('open'); mobileMenu.classList.toggle('open'); });
  mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { burger.classList.remove('open'); mobileMenu.classList.remove('open'); }));
</script>
</body>
</html>
